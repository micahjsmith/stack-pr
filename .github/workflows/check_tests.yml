name: Check Tests
on: [ pull_request ]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Set up Python
        uses: actions/setup-python@65d7f2d534ac1bc67fcd62888c5f4f3d2cb2b236 # v4
        with:
          python-version: '3.x'  # Specify the Python version you want to use
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install the package with its `dev` extra so the test tooling
          # (pytest, pytest-mock, ...) comes from the single list in
          # pyproject.toml rather than being duplicated here.
          pip install '.[dev]'
      - name: Run tests
        run: pytest tests/

